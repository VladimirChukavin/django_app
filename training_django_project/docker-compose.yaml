name: myapp

services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    command:
      - "python"
      - "manage.py"
      - "runserver"
      - "0.0.0.0:8080"
    ports:
      - '8000:8080'
    logging:
      driver: loki
      options:
#        loki-url: http://host.docker.internal:3100/loki/api/v1/push
#        loki-url: http://loki:3100/loki/api/v1/push
        loki-url: http://localhost:3100/loki/api/v1/push
        loki-retries: '3'
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:13.1.0-25196703233
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - '3000:3000'
    depends_on:
      - loki

  loki:
    image: grafana/loki:2.9.17
    ports:
      - '3100:3100'
    healthcheck:
      test: [ "CMD", "wget", '--spider', 'http://localhost:3100/ready' ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
