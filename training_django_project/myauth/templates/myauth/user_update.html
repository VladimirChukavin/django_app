{% extends 'myauth/base.html' %}

{% block title %}
Update user profile
{% endblock %}

{% block content %}
<h1>Update user profile {{ profile.user.username }}</h1>

<div>
    {% if profile.avatar %}
    <img src="{{ profile.avatar.url }}" width="150" alt='{{ profile.avatar.name }}'>
    {% else %}
    <p>No profile avatar</p>
    {% endif %}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type='submit'>Save</button>
    </form>
</div>

<p>
    <a href="{% url 'myauth:users_list' %}">Go to users list</a>
</p>
{% endblock %}
