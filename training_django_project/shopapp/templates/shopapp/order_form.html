{% extends 'shopapp/base.html' %}

{% block title %}
Order create form
{% endblock %}

{% block content %}
<h1>Order create form</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

</form>

<p>
    <a href="{% url 'shopapp:orders_list' %}">Back to orders list</a><br/>
</p>

{% endblock %}
